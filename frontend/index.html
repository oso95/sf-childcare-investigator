<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>SF Childcare Investigator</title>
<meta name="viewport" content="width=device-width,initial-scale=1" />
<style>
  :root {
    --bg: #0f1720;
    --panel: #18222c;
    --ink: #e6edf3;
    --ink-dim: #97a3b3;
    --accent: #ffb454;
    --ok: #73d13d;
    --warn: #ff7875;
    --border: #2a3542;
  }
  * { box-sizing: border-box; }
  body { margin: 0; font: 14px/1.5 -apple-system, BlinkMacSystemFont, "SF Pro Text", sans-serif;
         background: var(--bg); color: var(--ink); }
  header { padding: 18px 28px; border-bottom: 1px solid var(--border); display: flex; align-items: baseline; gap: 16px; }
  header h1 { margin: 0; font-size: 20px; font-weight: 600; }
  header .tag { font-size: 12px; color: var(--ink-dim); }
  main { display: grid; grid-template-columns: 360px 1fr; min-height: calc(100vh - 58px); }
  aside { padding: 20px; border-right: 1px solid var(--border); }
  aside label { display: block; font-size: 12px; color: var(--ink-dim); margin: 14px 0 4px; text-transform: uppercase; letter-spacing: .05em; }
  aside input, aside textarea, aside select {
    width: 100%; background: var(--panel); color: var(--ink); border: 1px solid var(--border);
    border-radius: 6px; padding: 8px 10px; font: inherit;
  }
  aside textarea { min-height: 110px; resize: vertical; }
  aside button {
    margin-top: 18px; width: 100%; background: var(--accent); color: #1a1a1a; border: 0;
    padding: 10px; border-radius: 6px; font-weight: 600; cursor: pointer;
  }
  aside button:disabled { background: #4a4a4a; color: #999; cursor: not-allowed; }
  section.work { padding: 24px 32px; overflow-y: auto; }
  .log { font-family: "SF Mono", Menlo, monospace; font-size: 12px; white-space: pre-wrap;
         background: var(--panel); border: 1px solid var(--border); border-radius: 8px;
         padding: 14px; max-height: 280px; overflow-y: auto; color: var(--ink-dim); }
  .log .call { color: var(--accent); }
  .log .result { color: var(--ok); }
  .log .err { color: var(--warn); }
  .report { margin-top: 18px; background: var(--panel); border: 1px solid var(--border);
            border-radius: 8px; padding: 22px; font-size: 14px; }
  .report h1, .report h2, .report h3 { color: var(--accent); }
  .report code { background: #0a1016; padding: 1px 6px; border-radius: 4px; }
  .kpi { display: flex; gap: 18px; margin-bottom: 12px; color: var(--ink-dim); font-size: 12px; }
  .kpi strong { color: var(--ink); }
</style>
</head>
<body>
<header>
  <h1>SF Childcare Investigator</h1>
  <span class="tag">powered by Hermai · inspired by Surelock-Homes</span>
</header>
<main>
  <aside>
    <label>Prompt</label>
    <textarea id="prompt" placeholder="e.g. Investigate SF facilities with capacity >= 80 for physical impossibility">Sweep the 3 largest licensed child care facilities in San Francisco and check each for physical impossibility under Title 22.</textarea>
    <label>Max turns</label>
    <input id="maxTurns" type="number" value="12" min="3" max="30" />
    <button id="run">Investigate</button>
  </aside>
  <section class="work">
    <div class="kpi">
      <div>Status: <strong id="status">idle</strong></div>
      <div>Turns: <strong id="turns">–</strong></div>
      <div>Tool calls: <strong id="toolCount">0</strong></div>
    </div>
    <div class="log" id="log">live tool-call log will appear here…</div>
    <div class="report" id="report" style="display:none"></div>
  </section>
</main>
<script>
  const $ = (id) => document.getElementById(id);
  const log = (line, cls="") => {
    const el = $("log");
    const span = document.createElement("span");
    if (cls) span.className = cls;
    span.textContent = line + "\n";
    el.appendChild(span);
    el.scrollTop = el.scrollHeight;
  };
  const setKpi = (turns, tc) => { $("turns").textContent = turns; $("toolCount").textContent = tc; };

  async function renderMarkdown(text) {
    // minimal md: bold headings, keep newlines, backticks
    const esc = (s) => s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
    return esc(text)
      .replace(/^### (.+)$/gm, "<h3>$1</h3>")
      .replace(/^## (.+)$/gm, "<h2>$1</h2>")
      .replace(/^# (.+)$/gm, "<h1>$1</h1>")
      .replace(/\*\*(.+?)\*\*/g, "<strong>$1</strong>")
      .replace(/`([^`]+)`/g, "<code>$1</code>")
      .replace(/\n/g, "<br/>");
  }

  $("run").addEventListener("click", async () => {
    const prompt = $("prompt").value.trim();
    if (!prompt) return;
    $("run").disabled = true; $("status").textContent = "running";
    $("log").textContent = ""; $("report").style.display = "none";
    let tc = 0;

    const resp = await fetch("/api/investigate/stream", {
      method: "POST",
      headers: {"content-type": "application/json"},
      body: JSON.stringify({prompt, max_turns: parseInt($("maxTurns").value, 10)}),
    });
    const reader = resp.body.getReader();
    const dec = new TextDecoder();
    let buf = "";

    while (true) {
      const {value, done} = await reader.read();
      if (done) break;
      buf += dec.decode(value, {stream: true});
      const parts = buf.split("\n\n");
      buf = parts.pop();
      for (const p of parts) {
        if (!p.startsWith("data: ")) continue;
        let ev; try { ev = JSON.parse(p.slice(6)); } catch { continue; }
        if (ev.type === "tool_call") {
          tc++; setKpi("–", tc);
          log(`→ ${ev.name}(${JSON.stringify(ev.arguments)})`, "call");
        } else if (ev.type === "tool_result") {
          const summary = ev.result?.count !== undefined ? `count=${ev.result.count}` : (ev.result?.error ? `ERROR ${ev.result.error}` : "ok");
          log(`← ${ev.name} ${summary} (${ev.elapsed_ms}ms)`, ev.result?.error ? "err" : "result");
        } else if (ev.type === "assistant_text") {
          if (ev.text.trim()) log(`[assistant] ${ev.text.slice(0, 280)}${ev.text.length>280?"…":""}`);
        } else if (ev.type === "final") {
          $("report").innerHTML = await renderMarkdown(ev.report);
          $("report").style.display = "block";
        } else if (ev.type === "error") {
          log(`[error] ${ev.error}`, "err");
        }
      }
    }
    $("status").textContent = "done"; $("run").disabled = false;
  });
</script>
</body>
</html>
